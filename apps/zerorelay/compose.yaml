# Run the ZeroClaw nominated relay (blind forwarder).
#
#   cd apps/zerorelay && podman compose up --build      # (or `docker compose`)
#
# Build context is the repository root because zerorelay is a workspace member.
services:
  zerorelay:
    build:
      context: ../..
      dockerfile: apps/zerorelay/Dockerfile
    image: zeroclaw/zerorelay:latest
    restart: unless-stopped
    ports:
      - "8443:8443"
    # Admission defaults to `open` (any daemon may register). For an approved-only
    # relay, switch to allowlist and pass the accepted relay token(s):
    #   command: ["--bind", "0.0.0.0:8443", "--registration-mode", "allowlist", "--allow", "<relay-token>"]
    command: ["--bind", "0.0.0.0:8443", "--registration-mode", "open"]
    healthcheck:
      # distroless has no shell; probe via the binary's own subcommand.
      test: ["CMD", "/usr/local/bin/zerorelay", "healthcheck", "--addr", "127.0.0.1:8443"]
      interval: 30s
      timeout: 5s
      retries: 3
